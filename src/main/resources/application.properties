spring.application.name=incident-service

server.address=127.0.0.1
server.port= 8081

spring.main.banner-mode=off

server.shutdown=graceful

logging.level.org.springframework.security=ERROR

# Database Configuration
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/trangile_support?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Tspl@#2022

# Connection Pool Settings (optional but recommended for production)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.initialization-mode=always
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
#logging.level.com.zaxxer.hikari=DEBUG
# Hibernate JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.main.allow-circular-references=true

spring.lifecycle.timeout-per-shutdown-phase=10s
